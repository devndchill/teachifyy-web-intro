name: Build and Push to Another Repo

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Push build to target repository
        run: |
          TARGET_REPO="devndchill-commits/teachifyy-web-build"

          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${TARGET_REPO}.git target-repo

          # Clear old build artifacts in target
          cd target-repo
          git rm -rf . --quiet 2>/dev/null || true
          cd ..

          # Copy full source + build output to target
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env*' \
            ./ target-repo/

          cd target-repo

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping push."
          else
            git commit -m "build: deploy from ${{ github.repository }}@${{ github.sha }}

Triggered by: ${{ github.actor }}
Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
            echo "Successfully pushed build to ${TARGET_REPO}"
          fi
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
